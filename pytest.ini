[pytest]
# Nur test_*.py als Test-Module behandeln (nicht pytest's Default *_test.py
# auch) -- sonst sammelt "pytest -v -s" versehentlich echte Analyse-Skripte
# wie src/probebot/analysis/bootstrap_test.py ein (Bootstrap-Signifikanztest,
# kein Unittest -- der Name kommt von "Bootstrap-Test" als Statistikbegriff).
python_files = test_*.py
norecursedirs = .venv src artifacts .git __pycache__
